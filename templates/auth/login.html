<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login -- NexaShop Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
*{
  box-sizing:border-box;
  margin:0;padding:0
}
body{
  background:#0a0c10;
  color:#eef0f6;
  font-family:DM Sans,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center
}
.bg-dots{
  position:fixed;
  inset:0;
  background-image:radial-gradient(#1e2230 1px,transparent 1px);
  background-size:30px 30px;
  pointer-events:none
}
.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,rgba(0,229,255,.07),transparent 70%);
  top:-150px;
  right:-150px;
  pointer-events:none
}
.login-card{
  background:#111318;
  border:1px solid #1e2230;
  border-radius:20px;
  padding:44px 40px;
  width:100%;
  max-width:420px;
  position:relative;
  z-index:1;
  animation:fadeUp .5s ease
}
@keyframes fadeUp{
  from
  {
    opacity:0;
    transform:translateY(24px)
  }
    to
  {
    opacity:1;
    transform:translateY(0)
  }
}
.brand{
  font-family:Syne,sans-serif;
  font-size:28px;
  font-weight:800;
  color:#00e5ff;
  text-align:center;
  margin-bottom:4px
}
.brand span{
  color:#8891a8;
  font-weight:400
}
.sub{
  text-align:center;
  color:#4a5168;
  font-size:13px;
  margin-bottom:32px
}
label{
  font-size:11px;
  font-weight:600;
  color:#8891a8;
  letter-spacing:.4px;
  text-transform:uppercase;
  display:block;
  margin-bottom:6px
}
.inp-wrap{
  position:relative;
  margin-bottom:16px
}
input[type=text],input[type=password]{
  width:100%;
  background:#0a0c10;
  border:1px solid #1e2230;
  border-radius:10px;
  padding:11px 14px;
  color:#eef0f6;
  font-size:14px;
  outline:none;
  transition:border-color .2s
}
input:focus{
  border-color:#00e5ff;
  box-shadow:0 0 0 3px rgba(0,229,255,.1)
}
input::placeholder{
  color:#4a5168
}
.btn-login{
  width:100%;
  background:#00e5ff;
  color:#000;
  border:none;
  border-radius:10px;
  padding:12px;
  font-family:Syne,sans-serif;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  margin-top:8px;
  transition:all .2s
}
.btn-login:hover{
  background:#00cfea;
  transform:translateY(-1px)
}
.error-box{
  background:rgba(255,64,129,.1);
  border:1px solid rgba(255,64,129,.3);
  border-radius:10px;
  padding:12px 16px;
  margin-bottom:20px;
  font-size:13px;
  color:#ff4081
}
.hint{
  text-align:center;
  margin-top:20px;
  padding:12px;
  background:#0a0c10;
  border:1px solid #1e2230;
  border-radius:10px;
  font-size:12px;
  color:#4a5168
}
.hint code{
  color:#00e5ff;
  font-weight:600
  }
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="glow"></div>
<div class="login-card">
  <div class="brand">
    Nexa
    <span>Shop</span>
  </div>
  <div class="sub">Sign in to Admin Dashboard</div>
  {% if form.errors %}
  <div class="error-box">Invalid username or password.</div>
  {% endif %}
  <form method="post">{% csrf_token %}
    <div>
      <label>Username</label>
      <div class="inp-wrap">
        <input type="text" name="username" placeholder="admin" autofocus required/>
      </div>
    </div>
    <div>
      <label>Password</label>
      <div class="inp-wrap">
        <input type="password" name="password" placeholder="enter password" required/>
      </div>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <div class="hint">
    Demo login: 
    <code>admin</code>
     / 
     <code>admin123</code>
    </div>
</div>
</body>
</html>
